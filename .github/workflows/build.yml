name: Build & Deploy Handbook

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'index.html'
      - 'build.py'
      - '*.jpg'
      - '*.avif'
      - '*.png'
  pull_request:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'index.html'

# Allow one concurrent deployment; cancel in-progress on new push
concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  # ── Job 1: Validate data files and print-page audit ───────────────────────
  validate:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validator
        run: python build.py --validate

  # ── Job 2: Build the handbook ─────────────────────────────────────────────
  build:
    name: Build handbook
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: python build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbook-dist
          path: dist/
          retention-days: 90

  # ── Job 3: Deploy to GitHub Pages ────────────────────────────────────────
